databases:
  - name: app-financas-db
    plan: free
    databaseName: app_financas
    user: app_financas

services:
  - type: web
    name: app-financas-web
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn financeiro.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        fromDatabase:
          name: app-financas-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: WEB_CONCURRENCY
        value: "4"
